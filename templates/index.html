<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆⚽  Bolão do Hexa 2026 - 1ª Edição ⚽ 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
    
    <header>
        <h1>🏆⚽ Bolão do Hexa 2026 - 1ª Edição ⚽ 🏆</h1>
        <div class="subtitle">Ranking e Resultados em Tempo Real</div>
    </header>

    <div class="controls-main">
        <div class="botoes-container">
            <button id="btn-atualizar" class="btn-action" onclick="carregarTudo()">Atualizar Dados</button>
            <a href="https://cc1l9i.s.gy/I5QGld" target="_blank" class="btn-action">Acessar Planilha</a>
        </div>
        <div id="status" class="status"></div>
    </div>

    <div id="painel-copa" class="painel-copa"></div>

    <div class="tabela-wrapper">
        <table class="tabela-ranking">
            <thead>
                <tr>
                    <th style="text-align: center;">POS</th>
                    <th>PARTICIPANTE</th>
                    <th style="text-align: right;">PONTOS</th>
                    <th style="text-align: right;">PRÊMIO</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <div class="chart-header">
        <div class="subtitle">Evolução de Pontos</div>
    </div>

    <div class="controls">
        <button class="btn-filter active" onclick="filterGroup('all', event)">Todos</button>
        <button class="btn-filter" onclick="filterGroup('top5', event)">Top 5</button>
        <button class="btn-filter" onclick="filterGroup('top10', event)">Top 10</button>
        <button class="btn-filter" onclick="filterGroup('bottom', event)">Últimos</button>
    </div>

    <div class="chart-wrap">
        <canvas id="chart"></canvas>
    </div>
    <div class="legend-grid" id="legend"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="/static/js/script.js?v=1001"></script>
    {% include 'monitor.html' %}
</body>
</html>
