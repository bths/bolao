<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Bolão 2026</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #f5c518; margin-bottom: 10px; }
        p { color: #aaaaaa; margin-bottom: 30px; line-height: 1.5; }
        .btn-sync {
            background-color: #f5c518;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }
        .btn-sync:hover { background-color: #d4a715; }
        .btn-sync:disabled { background-color: #555555; color: #888888; cursor: not-allowed; }
        
        .link-painel {
            display: block;
            margin-top: 25px;
            color: #45B7D1;
            text-decoration: none;
            font-size: 14px;
        }
        .link-painel:hover { text-decoration: underline; }

        #status-msg { margin-top: 20px; font-size: 14px; min-height: 20px; }
        .sucesso { color: #4caf50; }
        .erro { color: #f44336; }
        .carregando { color: #f5c518; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚙️ Painel Admin</h1>
        <p>Aperte o botão abaixo para sincronizar os dados da planilha.</p>
        
        <button id="btn-sincronizar" class="btn-sync" onclick="iniciarSincronizacao()">
            Sincronizar Planilha
        </button>

        <a href="/painel" class="link-painel">📊 Acessar Painel de Monitoramento</a>

        <div id="status-msg"></div>
    </div>

    <script>
        // Trava de segurança: só carrega a página se a senha estiver correta
        window.onload = function() {
            const senha = prompt("Digite a senha de administrador:");
            if (senha !== "FOGO13") {
                alert("Acesso Negado!");
                window.location.href = "/";
            } else {
                // Registra que o admin entrou no painel
                registrarAcessoAdmin();
            }
        };

        async function registrarAcessoAdmin() {
            fetch('/api/log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ evento: 'abertura' })
            });
        }

        async function iniciarSincronizacao() {
            const btn = document.getElementById('btn-sincronizar');
            const msg = document.getElementById('status-msg');

            btn.disabled = true;
            btn.innerText = "Sincronizando...";
            msg.className = "carregando";
            msg.innerText = "⏳ Processando...";

            try {
                const resposta = await fetch('/admin/sincronizar');
                const dados = await resposta.json();

                if (resposta.ok) {
                    msg.className = "sucesso";
                    msg.innerText = "✅ " + dados.mensagem;
                } else {
                    throw new Error(dados.error || "Erro desconhecido");
                }
            } catch (erro) {
                msg.className = "erro";
                msg.innerText = "❌ Falha: " + erro.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Sincronizar Planilha";
            }
        }
    </script>
</body>
</html>
